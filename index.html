<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de YouTube Shorts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="marquee">
    <div class="sprockets"></div>
    <div class="marquee__inner">
      <p class="eyebrow">Reel Finder</p>
      <h1>Buscador de YouTube Shorts</h1>
      <p class="subtitle">Encuentra los Shorts más vistos, filtra por idioma, país y fecha.</p>
    </div>
    <div class="sprockets"></div>
  </header>

  <main>
    <section class="panel filters" aria-label="Filtros de búsqueda">
      <form id="form-busqueda">
        <div class="campo campo--grande">
          <label for="q">Tema o palabra clave</label>
          <input type="text" id="q" name="q" placeholder="Ej: recetas rápidas, fútbol, tecnología...">
        </div>

        <div class="campo">
          <label for="region">País (código, ej: CO, US, ES)</label>
          <input type="text" id="region" name="region" maxlength="2" placeholder="CO">
        </div>

        <div class="campo">
          <label for="language">Idioma (código, ej: es, en, pt)</label>
          <input type="text" id="language" name="language" maxlength="5" placeholder="es">
        </div>

        <div class="campo">
          <label for="date_from">Publicado desde</label>
          <input type="date" id="date_from" name="date_from">
        </div>

        <div class="campo">
          <label for="date_to">Publicado hasta</label>
          <input type="date" id="date_to" name="date_to">
        </div>

        <div class="campo">
          <label for="max_results">Cantidad de resultados</label>
          <input type="number" id="max_results" name="max_results" min="1" max="50" value="25">
        </div>

        <button type="submit" class="boton-primario">Buscar Shorts</button>
      </form>
    </section>

    <section class="panel controles-resultado" id="controles-resultado" hidden>
      <div class="campo campo--compacta">
        <label for="filtro-idioma">Filtrar por idioma</label>
        <select id="filtro-idioma"><option value="">Todos</option></select>
      </div>
      <div class="campo campo--compacta">
        <label for="filtro-pais">Filtrar por país</label>
        <select id="filtro-pais"><option value="">Todos</option></select>
      </div>
      <div class="campo campo--compacta">
        <label for="orden-vistas">Orden por vistas</label>
        <select id="orden-vistas">
          <option value="desc">Mayor a menor</option>
          <option value="asc">Menor a mayor</option>
        </select>
      </div>
      <p class="contador" id="contador-resultados"></p>
    </section>

    <p class="mensaje mensaje--error" id="mensaje-error" hidden></p>
    <p class="mensaje" id="mensaje-cargando" hidden>Buscando Shorts en YouTube...</p>
    <p class="mensaje" id="mensaje-vacio" hidden>No encontramos Shorts con esos filtros. Prueba con otra palabra clave o cambia las fechas.</p>

    <section class="resultados" id="resultados"></section>
  </main>

  <footer>
    <p>Datos obtenidos en tiempo real desde YouTube Data API v3.</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
